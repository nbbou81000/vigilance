name: Update Vigilance Data

on:
  workflow_dispatch: {}
  schedule:
    # Toutes les 30 minutes
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch vigilance data
        run: node scripts/fetch-vigilance.mjs

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update vigilance data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
